name: mobile_app
description: "A real-time chat and calling app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # File & Media (FIXED to avoid conflict)
  file_picker: ^6.1.1
  path_provider: ^2.1.5

  # Audio recording
  record: ^6.2.0

  # Video/Audio calling (MODERN VERSION)
  agora_rtc_engine: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/